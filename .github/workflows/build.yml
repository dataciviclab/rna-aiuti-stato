name: build

on:
  workflow_dispatch:
    inputs:
      years:
        description: 'Anni da processare (es. "2023-2025" o "full")'
        required: false
        default: "current"
      workers:
        description: 'Worker paralleli'
        required: false
        default: "4"
  schedule:
    # Mensile: aggiorna al 5 del mese
    - cron: "0 6 5 * *"

env:
  RNA_OUT: data/derived/rna
  GCS_BUCKET: gs://dataciviclab-clean/rna-aiuti-stato
  # Secret GCP — ereditati dall'organization dataciviclab
  GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}

jobs:
  build:
    runs-on: [self-hosted, rna-arm64]
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Installa dipendenze
        run: pip install -e "."

      - name: Configura anni
        id: years
        run: |
          if [[ "${{ inputs.years }}" == "current" ]]; then
            echo "range=--from $(date +%Y) --to $(date +%Y)" >> "$GITHUB_OUTPUT"
          elif [[ "${{ inputs.years }}" == "full" || "${{ inputs.years }}" == "" ]]; then
            echo "range=--full" >> "$GITHUB_OUTPUT"
          else
            # Formato "2023-2025" o "2025" (anno singolo)
            IFS='-' read -r from to <<< "${{ inputs.years }}"
            if [[ -z "$to" ]]; then
              echo "range=--from $from --to $from" >> "$GITHUB_OUTPUT"
            else
              echo "range=--from $from --to $to" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Esegui batch RNA (streaming HTTP, zero storage raw)
        # Self-hosted runner su Oracle Cloud Frankfurt (IP non bloccato da RNA.gov.it)
        run: |
          python3 scripts/full_batch.py ${{ steps.years.outputs.range }} \
            --workers ${{ inputs.workers || '4' }} \
            -o "$RNA_OUT"

      - name: Genera MANIFEST.json
        run: python3 scripts/generate_manifest.py "$RNA_OUT"

      - name: Autenticazione GCP con SA key
        id: gcp-auth
        if: env.GCP_SA_KEY_RNA != ''
        run: |
          printf '%s\n' "$GCP_SA_KEY_RNA" > /tmp/gcp-key.json
          gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
          echo "gcp_ready=true" >> "$GITHUB_OUTPUT"
        env:
          GCP_SA_KEY_RNA: ${{ secrets.GCP_SA_KEY_RNA }}

      - name: Pusha parquet a GCS
        if: steps.gcp-auth.outputs.gcp_ready == 'true'
        run: |
          gsutil -m cp "$RNA_OUT"/*.parquet "$GCS_BUCKET/"
          echo "✅ Parquet pushati a $GCS_BUCKET"

      - name: Carica parquet come artifact CI (fallback)
        if: steps.gcp-auth.outputs.gcp_ready != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: rna-parquet
          path: ${{ env.RNA_OUT }}/*.parquet
          retention-days: 30

      - name: Prepara messaggio commit
        id: commit-msg
        run: |
          MSG=$(python3 -c "import json; m = json.load(open('data/derived/manifests/rna_index.json')); print(f'{len(m[\"years\"])} anni, {m[\"total_rows\"]:,} righe, {m[\"total_size_mb\"]} MB')")
          echo "message=$MSG" >> "$GITHUB_OUTPUT"

      - name: Commit manifest aggiornato
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/derived/manifests/
          if git diff --cached --quiet; then
            echo "Nessuna modifica ai manifest"
          else
            git commit -m "Aggiornamento manifest: ${{ steps.commit-msg.outputs.message }}"
            git push
            echo "Manifest committato"
          fi

      - name: Riepilogo
        run: |
          echo "=== STATO FINALE ==="
          cat data/derived/manifests/rna_index.json
          echo ""
          echo "GCS: ${{ env.GCS_BUCKET }}"
